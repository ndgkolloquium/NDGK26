<ul>
	<li><b>Georges Neaime</b> [Universit&auml;t Bielefeld]<br>
    	<em>Titel:</em> <b>Non-crossing partitions for exceptional hereditary curves</b>
     	<div class="infos0"><em><b>Abstract</b>: </em>
		 	We introduce the notion of reflection groups of canonical type, arising from the $K$-theoretic study of the canonical algebras introduced by Ringel. We establish a bijection between 
			 the non-crossing partitions associated with these groups and certain subcategories of coherent sheaves on an exceptional hereditary curve defined over an arbitrary field. Combined with 
			 a result of Hubery and Krause, this completes the programme of categorification of generalised non-crossing partitions. <br>
			 The results presented in this talk are available in a recent preprint (https://arxiv.org/abs/2512.01729).
	 	</div><br>
   	</li>
	<li><b>Ga&euml;tan Emmanuel Mancini</b> [Bergische Universit&auml;t Wuppertal]<br>
    	<em>Titel:</em> <b>On the inductive Alperin--McKay conditions for groups of exceptional type</b>
    	 <div class="infos0"><em><b>Abstract</b>: </em>
			In 2013, B. Sp&auml;th has reduced the Alperin--McKay conjecture to the verification of certain conditions on blocks of (quasi-)simple groups. 
			In this talk we will discuss the methods used to prove these conditions for certain blocks of groups of exceptional type. In particular we will discuss the construction 
			 and role of the group $M$ related to $d$-split Levi subgroups.
	 	</div><br>
   	</li>
	<li><b>Frank L&uuml;beck</b> [RWTH Aachen]<br> 
    	<em>Title:</em> <b>The GAP package CCTab for constructing character tables</b>
    	<div class="infos0"><em><b>Abstract</b>:</em> 
			There are essentially two algorithms to compute the ordinary character tables of arbitrary finite groups, which are used in practice:
			the Dixon-Schneider method (in GAP and Magma) and the (often much more powerful) approach by Bill Unger, implemented in Magma, which is based
			on Brauer's characterization of characters via elementary subgroups and lattice reduction. 
			<br>
			In this talk I will comment on some aspects of an attempt to implement a new method in GAP which is efficient and more flexible and interactive (if
			needed in difficult cases) than the method in Magma.
		</div><br>
	</li> 
  	<li><b>Thomas Breuer</b> [RWTH Aachen]<br>
    	<em>Titel:</em> <b>On the total degree of a finite group</b>
    	 <div class="infos0"><em><b>Abstract</b>: </em>
			For a finite group $G$, the total degree $T(G)$ is defined as the sum of the degrees of the complex irreducible characters of $G$.
    		We classify the groups with $T(G) \leq 100$,
    		using computational methods, and investigate special cases such as groups of prime power order
    		and groups with total degree the square of a prime. 
			<br>
    		This is joint work with L&aacute;szl&oacute; H&eacute;thelyi, Burkhard K&uuml;lshammer, and Magdolna Sz&ouml;ke.
	 	</div><br>
  	</li> 
	<li><b>Nicola Grittini</b> [RPTU Kaiserslautern-Landau]<br>
    	<em>Titel:</em> <b>On Huppert’s $ρ-σ$ conjecture and its connection with some arithmetic properties of group actions</b>
     	<div class="infos0"><em><b>Abstract</b>: </em>
			For a finite group $G$, we may call $\rho(G)$ the set of all prime numbers dividing the degree of at least one irreducible character of $G$, and we may
			call $\sigma(G)$ the maximal number of primes dividing the degree of a single irreducible character of $G$. Huppert’s $ρ-σ$ conjecture states that, for any
			group $G$, $|\rho(G)| \le 3\sigma(G)$. A stronger version of this conjecture claims that it is actually possible to find three irreducible characters $\psi_1,\psi_2,\psi_3 \in Irr(G)$ 
			such that every prime in $\rho(G)$ divides the degree of at least one of them.<br>
			In this seminar, we will present an overview of the current progress on this conjecture, which is still not reduced to simple groups, and we will see
			how any possible approach to a general proof needs to involve the study of some properties of group action on sets and vector spaces.
	 	</div><br>
   	</li> 
	<li><b>Deniz Yilmaz</b> [Bilkent University]<br>
    	<em>Titel:</em> <b>Alperin’s weight conjecture and diagonal $p$-permutation functors</b>
     	<div class="infos0"><em><b>Abstract</b>: </em>
       		Alperin’s weight conjecture asserts that the number of isomorphism classes of simple modules of a block is equal to the number of conjugacy classes of weights. In this talk,
			we will present an equivalent reformulation of the conjecture in terms of diagonal $p$-permutation functors. 
			<br>
			Joint work with Robert Boltje and Serge Bouc.
    	</div><br>
   </li>   
	<li><b>Edoardo Salati</b> [RPTU Kaiserslautern-Landau]<br>
   		<em>Titel:</em> <b>Embeddability of partial groups</b>
     	<div class="infos0"><em><b>Abstract</b>: </em>
       		Partial groups were introduced by Chermak to assign to every saturated fusion system a topological space, which is analogous to the classifying space $BG$ of a group $G$. 
		 	The fundamental group $\pi(\mathcal{F})$ of a fusion system $\mathcal{F}$ is then that of such topological space; this comes paired with a canonical map from the partial 
		 	group associated to $\mathcal{F}$ to $\pi(\mathcal{F})$.
			<br>
			Intuition suggests such map being an embedding, but known examples show this statement to be false in general. We identify and show that there 
		 	is only one type of obstruction to this embeddability problem, related to ``local failures of associativity" in partial groups, and characterize the embeddable ones as an orthogonality class.
			<br>
			This is joint work with Philip Hackney and Justin Lynd.
    	</div><br>
   	</li>
	<li><b>Lucas Ruhstorfer</b> [Bergische Universit&auml;t Wuppertal]<br> 
    	<em>Title:</em> <b>Galois automorphisms and blocks covering unipotent blocks</b>
    	<div class="infos0"><em><b>Abstract</b>:</em> 
			Many interesting problems in the representation theory of finite groups aim to relate information about a group's structure to information that can be obtained from the character table. 
			One of these problems is the recent question of Lyons-Martínez-Navarro-Tiep regarding the field of values of extensions of characters in principal blocks. <br>
			We will discuss how this question is related to understanding the distribution of characters of unipotent blocks of almost simple groups of Lie type.
		</div><br>
	</li>
</ul>

        
       

<ul>
   <li><b>Olivier Dudas</b> [Aix-Marseille Universit&eacute;]<br>
    <em>Titel:</em> <b>Row and column removal rules for finite unitary groups</b>
     <div class="infos0"><em><b>Abstract</b>: </em>
       James gave in the 80's a construction of the unipotent representations of the finite general linear groups GL(n,q), very similar to the construction of Young, Specht and simple modules for the symmetric groups. This construction was then used to show a combinatorial property for the decomposition numbers (which can be computed as the multiplicity of a simple module in a Specht module). It uses two ingredients:<br>
       - Harish-Chandra induction/restriction from Levi subgroups of GL(n,q);<br>
       - Linear character of the group of unitriangular matrices (yielding Gelfand-Graev representations).<br>
      In a work in progress with Pengcheng Li, we propose a generalisation of this construction to finite general unitary groups, replacing the Harish-Chandra induction by the Howe correspondence, and the Gelfand-Graev representations by their generalisation to other unipotent classes.
    </div><br>
   </li>   
    <li><b>Arnaud Eteve</b> [MPIM Bonn]<br>
    <em>Titel:</em> <b>Tilting representations</b>
     <div class="infos0"><em><b>Abstract</b>: </em>
       Let \(G\) be a finite reductive group of defining characteristic \(p\) and \(\ell \neq p\) a prime. The goal of this talk is to discuss a work in progress on a generating collection of integral projective representations of \(G\) which we call tilting representations. Their definition is motivated by the theory of tilting objects in Hecke categories and connexions between the representation theory of \(G\) and Hecke categories. Hecke categories are equipped with a Koszul duality exchanging simple and tilting objects, in our setting we discuss the relation between these tilting representations and the Alvis-Curtis dual of the representations coming from the intersection cohomology of Deligne-Lusztig varieties.
    </div><br>
   </li>
<li><b>Sonia Petschick</b> [Bergische Universit&auml;t Wuppertal]<br> 
    <em>Title:</em> <b>Steps towards the inductive Galois-McKay conditions for type A </b>
    <div class="infos0"><em><b>Abstract</b>:</em> 
       Navarro's refinement of the McKay conjecture suggests that the bijection from the original conjecture can be made equivariant under specific Galois automorphisms. Like the McKay conjecture, this refinement was reduced to inductive statements for quasi-simple groups by Navarro, Späth, and Vallejo in 2019. In this talk we will explore which tools and techniques can be applied to establishing the inductive conditions of the Galois refinement for simple groups of type A. In particular we focus on the challenge of achieving the equivariance property.
      </div><br>
</li> 
<li><b>Damiano Rossi</b> [RPTU KL-LD]<br> 
    <em>Title:</em> <b>An inductive version of Alperin's lower bound on Brauer characters</b>
    <div class="infos0"><em><b>Abstract</b>:</em> 
      In this talk, I will recall the statement of Alperin's Weight Conjecture and some of its consequences. I will then present some old and new reduction theorems for these statements to question about finite simple groups and show how they can be used to obtain new unexpected results. In particular, I will show how a new reduction theorem for Alperin's bound on Brauer characters can be used to characterise groups with a normal Sylow 2-subgroup in terms of Brauer characters. The latter statement builds on some recent results (still work in progress) of Mart&igrave;nez and Schaeffer-Fry.
      </div><br>
</li>    
<li><b>Lucas Ruhstorfer</b> [Bergische Universit&auml;t Wuppertal]<br> 
    <em>Title:</em> <b>The Alperin-McKay conjecture and blocks of maximal defect</b>
    <div class="infos0"><em><b>Abstract</b>:</em> 
       For blocks of maximal defect the Alperin-McKay conjecture can be seen as a blockwise refinement of the recently proved McKay conjecture. I will explain what additional block-theoretic problems arise in this situation and report on recent progress on this question. This is joint work with Britta Sp&auml;th.
      </div><br>
</li>       
<li><b>Edoardo Salati</b> [Technische Universit&auml;t Dresden]<br> 
    <em>Title:</em> <b>Fusion systems and localities with a large \(p\)-subgroup</b>
    <div class="infos0"><em><b>Abstract</b>:</em> 
       In the framework of a project initiated by Meierfrankenfeld, Stellmacher and Stroth, whose aim consists in describing all finite simple groups of local characteristic \(p\), an additional property shared by most of the generic examples is detected and successfully employed: namely, possessing a large \(p\)-subgroup. Indeed, a milestone of the project is the Local Structure Theorem for finite groups with a large \(p\)-subgroup (LST).<br>
       Core of the talk will be recent advancements related to the development of an analogous result for structures that function as models of the \(p\)-local information of a finite group, namely fusion systems and localities. After setting the proper initial stage, our approach allowed to use the known proof of the LST as a blueprint for many of the appearing cases; we will present the results by comparison with the LST, showing where our approach has been, and can in future be, successful and where it encounters obstructions intrinsic in the different nature of the objects we focus on.<br>
       This project was the main topic of my doctoral dissertation under the supervision of Ellen Henke.
      </div><br>
</li>   
<li><b>Carolina Vallejo Rodr&iacute;guez</b> [Universit&agrave;  degli studi di Firenze]<br> 
    <em>Title:</em> <b>Characters and Sylow abelianization</b>
    <div class="infos0"><em><b>Abstract</b>: </em> 
       In this talk, I will discuss how the character table of a finite group \(G\) can be used to determine whether the Sylow \(p\)-subgroups of \(G\) have a small abelianization. This is based in joint work with Eugenio Giannelli, Noelia Rizo and Mandi Schaeffer Fry. 
      </div><br>

    
</ul>
